id: io.github.EerieGoesD.DeckToolbox
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: deck-toolbox
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --filesystem=home
  - --filesystem=/run/media
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: deck-toolbox
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/deck-toolbox/cargo
    sources:
      - type: dir
        path: ..
      - cargo-sources.json
    build-commands:
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml
      - cargo --offline build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/deck-toolbox /app/bin/deck-toolbox
      - install -Dm644 io.github.EerieGoesD.DeckToolbox.desktop /app/share/applications/io.github.EerieGoesD.DeckToolbox.desktop
      - install -Dm644 icons/io.github.EerieGoesD.DeckToolbox.png /app/share/icons/hicolor/256x256/apps/io.github.EerieGoesD.DeckToolbox.png
      - install -Dm644 io.github.EerieGoesD.DeckToolbox.metainfo.xml /app/share/metainfo/io.github.EerieGoesD.DeckToolbox.metainfo.xml
      - mkdir -p /app/share/deck-toolbox/scripts
      - install -m755 src-tauri/resources/scripts/*.sh /app/share/deck-toolbox/scripts/
