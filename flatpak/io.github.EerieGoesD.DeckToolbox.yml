id: io.github.EerieGoesD.DeckToolbox
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: deck-toolbox
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --filesystem=home
  - --filesystem=/run/media
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: rust
    buildsystem: simple
    build-options:
      no-debuginfo: true
    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://static.rust-lang.org/dist/rust-1.89.0-x86_64-unknown-linux-gnu.tar.xz
        sha256: c4f2796b10ee886001f0799bc40caea38746403a33c379d77878c4f4683f9b51
    build-commands:
      - ./install.sh --prefix=/usr --destdir=/run/build/rust/install
      - cp -r /run/build/rust/install/usr /app/rust
    cleanup: ['*']

  - name: deck-toolbox
    buildsystem: simple
    build-options:
      append-path: /app/rust/bin
      env:
        CARGO_HOME: /run/build/deck-toolbox/cargo
    sources:
      - type: dir
        path: ..
      - cargo-sources.json
    build-commands:
      - /app/rust/bin/cargo --offline fetch --manifest-path src-tauri/Cargo.toml
      - /app/rust/bin/cargo --offline build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/deck-toolbox /app/bin/deck-toolbox
      - install -Dm644 io.github.EerieGoesD.DeckToolbox.desktop /app/share/applications/io.github.EerieGoesD.DeckToolbox.desktop
      - install -Dm644 icons/io.github.EerieGoesD.DeckToolbox.png /app/share/icons/hicolor/256x256/apps/io.github.EerieGoesD.DeckToolbox.png
      - install -Dm644 io.github.EerieGoesD.DeckToolbox.metainfo.xml /app/share/metainfo/io.github.EerieGoesD.DeckToolbox.metainfo.xml
      - mkdir -p /app/share/deck-toolbox/scripts
      - install -m755 src-tauri/resources/scripts/*.sh /app/share/deck-toolbox/scripts/
