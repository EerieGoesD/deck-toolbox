id: io.github.EerieGoesD.DeckToolbox
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: deck-toolbox
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --filesystem=home
  - --filesystem=/run/media
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: deck-toolbox
    buildsystem: simple
    build-commands:
      - install -Dm755 deck-toolbox /app/bin/deck-toolbox
      - install -Dm644 io.github.EerieGoesD.DeckToolbox.desktop /app/share/applications/io.github.EerieGoesD.DeckToolbox.desktop
      - install -Dm644 io.github.EerieGoesD.DeckToolbox.png /app/share/icons/hicolor/256x256/apps/io.github.EerieGoesD.DeckToolbox.png
      - install -Dm644 io.github.EerieGoesD.DeckToolbox.metainfo.xml /app/share/metainfo/io.github.EerieGoesD.DeckToolbox.metainfo.xml
      - mkdir -p /app/share/deck-toolbox/scripts
      - install -m755 scripts/*.sh /app/share/deck-toolbox/scripts/
    sources:
      - type: file
        path: deck-toolbox
      - type: file
        path: io.github.EerieGoesD.DeckToolbox.desktop
      - type: file
        path: io.github.EerieGoesD.DeckToolbox.png
      - type: file
        path: io.github.EerieGoesD.DeckToolbox.metainfo.xml
      - type: dir
        path: scripts
        dest: scripts
