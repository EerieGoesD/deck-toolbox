name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest

    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git rust cargo \
            webkit2gtk-4.1 gtk3 \
            pkgconf patchelf \
            libayatana-appindicator

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build AppImage
        run: cargo tauri build --bundles appimage

      - name: Patch AppImage to fix Steam Deck EGL crash
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          chmod +x "$APPIMAGE"
          # Extract, patch AppRun to set EGL workaround, repack
          "$APPIMAGE" --appimage-extract
          # Prepend environment fix to AppRun
          sed -i '2i export WEBKIT_DISABLE_DMABUF_RENDERER=1\nexport GDK_BACKEND=x11' squashfs-root/AppRun
          # Remove bundled Mesa/EGL that conflicts with Steam Deck GPU drivers
          rm -f squashfs-root/usr/lib/x86_64-linux-gnu/libEGL* 2>/dev/null || true
          rm -f squashfs-root/usr/lib/x86_64-linux-gnu/libGLES* 2>/dev/null || true
          rm -f squashfs-root/usr/lib/x86_64-linux-gnu/libgbm* 2>/dev/null || true
          rm -rf squashfs-root/usr/lib/x86_64-linux-gnu/dri 2>/dev/null || true
          # Repack
          pacman -S --noconfirm appimagetool || true
          if command -v appimagetool &>/dev/null; then
            ARCH=x86_64 appimagetool squashfs-root "$APPIMAGE"
          else
            curl -sL https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
            chmod +x appimagetool
            ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          fi
          rm -rf squashfs-root

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Deck Toolbox v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
