name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest

    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git rust cargo \
            webkit2gtk-4.1 gtk3 \
            pkgconf patchelf \
            libayatana-appindicator

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build binary
        run: cargo tauri build --no-bundle

      - name: Build pacman package
        run: |
          # makepkg can't run as root, create a build user
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg --nodeps --noextract"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Deck Toolbox v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            *.pkg.tar.zst
